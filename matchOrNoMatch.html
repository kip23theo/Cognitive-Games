<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match Game</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #f5f6fa;
  overflow-x: hidden;
}

.header {
  width: 100%;
  height: 60px;
  background: #fff;
  border-bottom: 1px solid #ddd;
  display: flex;
  align-items: center;
  justify-content: center;
  position: fixed;
  top: 0;
  left: 0;
  z-index: 1000;
}

.header h2 {
  font-size: 20px;
}

.back-btn {
  position: absolute;
  left: 15px;
  background: none;
  border: none;
  font-size: 18px;
  color: #6c5ce7;
  font-weight: bold;
  cursor: pointer;
}

#menuScreen {
  width: 100%;
  min-height: 100vh;
  padding-top: 90px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
}

.menu-card {
  width: 90%;
  max-width: 420px;
  background: #fff;
  border-radius: 20px;
  padding: 30px 20px;
  text-align: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

.icon {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: linear-gradient(135deg,#6c5ce7,#4834d4);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: auto;
  font-size: 36px;
  color: white;
}

.menu-card h1 {
  margin-top: 15px;
  font-size: 34px;
}

.tag {
  display: inline-block;
  margin-top: 10px;
  background: #eee9ff;
  color: #6c5ce7;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
}

.desc {
  margin-top: 15px;
  color: #666;
  font-size: 15px;
}

.how-card {
  width: 90%;
  max-width: 420px;
  background: #fff;
  border-radius: 20px;
  padding: 25px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

.how-card h2 {
  margin-bottom: 15px;
}

.step {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 12px 0;
}

.num {
  width: 34px;
  height: 34px;
  border-radius: 10px;
  background: #f1ede7;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}

.start-btn {
  width: 90%;
  max-width: 420px;
  height: 60px;
  border: none;
  border-radius: 16px;
  background: linear-gradient(135deg,#6c5ce7,#4834d4);
  color: white;
  font-size: 22px;
  font-weight: bold;
  cursor: pointer;
}

#gameScreen {
  display: none;
  width: 100%;
  height: 100vh;
  padding-top: 60px;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  overflow: hidden;
}

.top-bar {
  width: 95%;
  max-width: 520px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 0 auto 18px auto;
  font-weight: bold;
  font-size: 14px;
  text-align: center;
}

.rule {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 24px;
  text-align: center;
  padding: 0 10px;
}

.panels {
  width: 100%;
  max-width: 520px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 60px;
  margin: 20px auto 30px auto;
}

.panel {
  width: 140px;
  height: 140px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.circle {
  width: 90px;
  height: 90px;
  border-radius: 50%;
}

.triangle {
  width: 0;
  height: 0;
  border-left: 45px solid transparent;
  border-right: 45px solid transparent;
  border-bottom: 90px solid;
}

.buttons {
  display: flex;
  justify-content: center;
  gap: 14px;
  width: 90%;
  max-width: 380px;
  margin: 10px auto 0;
}

.buttons button {
  flex: 1;
  height: 52px;
  border: none;
  border-radius: 12px;
  color: white;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
}

.match {
  background: #e57373;
}

.nomatch {
  background: #4fc3f7;
}

#message {
  margin-top: 18px;
  font-size: 24px;
  font-weight: bold;
  min-height: 30px;
}

#gameOver {
  display: none;
  width: 100%;
  height: 100vh;
  padding-top: 60px;
  text-align: center;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

#gameOver h1 {
  font-size: 40px;
}

#gameOver h2 {
  margin-top: 15px;
  color: #6c5ce7;
}

.restart {
  margin-top: 25px;
  width: 220px;
  height: 55px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg,#6c5ce7,#4834d4);
  color: white;
  font-size: 20px;
  font-weight: bold;
  cursor: pointer;
}

@media(max-width:500px) {
  #gameScreen {
    justify-content: center;
    padding-top: 60px;
  }

  .top-bar {
    font-size: 12px;
    margin-bottom: 16px;
  }

  .rule {
    font-size: 18px;
    margin-bottom: 20px;
  }

  .panels {
    gap: 30px;
    margin: 18px auto 25px auto;
  }

  .panel {
    width: 120px;
    height: 120px;
  }

  .circle {
    width: 80px;
    height: 80px;
  }

  .triangle {
    border-left: 40px solid transparent;
    border-right: 40px solid transparent;
    border-bottom: 80px solid;
  }

  .buttons button {
    font-size: 15px;
  }
}

@media(orientation:landscape) {
  #gameScreen {
    justify-content: center;
    padding-top: 60px;
  }

  .top-bar {
    margin-bottom: 10px;
  }

  .rule {
    font-size: 18px;
    margin-bottom: 10px;
  }

  .panels {
    gap: 60px;
    margin: 10px auto 18px auto;
  }

  .panel {
    width: 120px;
    height: 120px;
  }

  .circle {
    width: 75px;
    height: 75px;
  }

  .triangle {
    border-left: 38px solid transparent;
    border-right: 38px solid transparent;
    border-bottom: 76px solid;
  }

  .buttons button {
    height: 44px;
    font-size: 15px;
  }
}
</style>
</head>

<body>

<div class="header">
  <button class="back-btn" onclick="goHome()">← Back</button>
  <h2>Match Game</h2>
</div>

<div id="menuScreen">
  <div class="menu-card">
    <div class="icon">🎯</div>
    <h1>Match Game</h1>
    <div class="tag">Memory · Matching</div>
    <p class="desc">Compare both sides and decide if they MATCH or NOT.</p>
  </div>

  <div class="how-card">
    <h2>How to Play</h2>
    <div class="step">
      <div class="num">1</div>
      <div>Observe both sides carefully</div>
    </div>
    <div class="step">
      <div class="num">2</div>
      <div>Compare shapes or colors</div>
    </div>
    <div class="step">
      <div class="num">3</div>
      <div>Tap MATCH or NO MATCH</div>
    </div>
  </div>

  <button class="start-btn" onclick="startGame()">▶ Start Game</button>
</div>

<div id="gameScreen">
  <div class="top-bar">
    <div>Score<br><span id="score">0</span></div>
    <div>High<br><span id="high">0</span></div>
    <div>Level<br><span id="level">1</span></div>
    <div>Round<br><span id="round">1</span>/30</div>
  </div>

  <div class="rule" id="rule">
    Compare only shapes — MATCH or NO MATCH?
  </div>

  <div class="panels">
    <div class="panel" id="leftPanel"></div>
    <div class="panel" id="rightPanel"></div>
  </div>

  <div class="buttons">
    <button class="match" onclick="answer(true)">MATCH</button>
    <button class="nomatch" onclick="answer(false)">NO MATCH</button>
  </div>

  <div id="message"></div>
</div>

<div id="gameOver">
  <h1>Game Over 🎮</h1>
  <h2>Final Score: <span id="finalScore">0</span></h2>
  <button class="restart" onclick="restartGame()">Restart</button>
</div>

<script src="shared.js"></script>

<script>
const leftPanel = document.getElementById("leftPanel");
const rightPanel = document.getElementById("rightPanel");
const scoreEl = document.getElementById("score");
const highEl = document.getElementById("high");
const levelEl = document.getElementById("level");
const roundEl = document.getElementById("round");
const messageEl = document.getElementById("message");
const finalScoreEl = document.getElementById("finalScore");

let score = 0;
let level = 1;
let round = 1;
let maxRounds = 30;

let highScore = Number(localStorage.getItem("match-high")) || 0;
highEl.innerText = highScore;

const shapes = ["circle", "triangle"];
const colors = ["#6c5ce7", "#00b894", "#e17055", "#fdcb6e"];

let isMatch = false;
let audioCtx = null;

function goHome() {
  window.location.href = "index.html";
}

function soundAllowed() {
  if (typeof isSoundOn === "function") {
    return isSoundOn();
  }
  return localStorage.getItem("ctg-sound") !== "off";
}

function beep(type) {
  if (!soundAllowed()) return;

  const AudioContext = window.AudioContext || window.webkitAudioContext;
  if (!AudioContext) return;

  if (!audioCtx) {
    audioCtx = new AudioContext();
  }

  if (audioCtx.state === "suspended") {
    audioCtx.resume();
  }

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.frequency.value = type === "good" ? 650 : 180;
  gain.gain.value = 0.12;

  osc.start();
  setTimeout(() => osc.stop(), 120);
}

function startGame() {
  document.getElementById("menuScreen").style.display = "none";
  document.getElementById("gameScreen").style.display = "flex";
  document.getElementById("gameOver").style.display = "none";

  score = 0;
  level = 1;
  round = 1;

  scoreEl.innerText = 0;
  levelEl.innerText = 1;
  roundEl.innerText = 1;
  messageEl.innerText = "";

  newRound();
}

function restartGame() {
  startGame();
}

function randomShape() {
  return shapes[Math.floor(Math.random() * shapes.length)];
}

function randomColor() {
  return colors[Math.floor(Math.random() * colors.length)];
}

function makeShape(shape, color) {
  const d = document.createElement("div");

  if (shape === "circle") {
    d.className = "circle";
    d.style.background = color;
  }

  if (shape === "triangle") {
    d.className = "triangle";
    d.style.borderBottomColor = color;
  }

  return d;
}

function newRound() {
  leftPanel.innerHTML = "";
  rightPanel.innerHTML = "";

  let leftShape = randomShape();
  let leftColor = randomColor();

  let rightShape = leftShape;
  let rightColor = leftColor;

  isMatch = Math.random() > 0.5;

  if (!isMatch) {
    if (Math.random() > 0.5) {
      rightShape = randomShape();
    }

    if (Math.random() > 0.5) {
      rightColor = randomColor();
    }

    if (rightShape === leftShape && rightColor === leftColor) {
      rightColor = colors.find(c => c !== leftColor);
    }
  }

  leftPanel.appendChild(makeShape(leftShape, leftColor));
  rightPanel.appendChild(makeShape(rightShape, rightColor));
}

function answer(user) {
  if (user === isMatch) {
    score += 2;
    messageEl.style.color = "green";
    messageEl.innerText = "Correct ✅";
    beep("good");
  } else {
    messageEl.style.color = "red";
    messageEl.innerText = "Wrong ❌";
    beep("bad");
  }

  if (score > highScore) {
    highScore = score;
    localStorage.setItem("match-high", highScore);
    highEl.innerText = highScore;
  }

  scoreEl.innerText = score;

  if (score >= 10) level = 2;
  if (score >= 20) level = 3;

  levelEl.innerText = level;

  if (round >= maxRounds) {
    setTimeout(gameOver, 400);
    return;
  }

  round++;
  roundEl.innerText = round;

  setTimeout(() => {
    messageEl.innerText = "";
    newRound();
  }, 400);
}

function gameOver() {
  document.getElementById("gameScreen").style.display = "none";
  document.getElementById("gameOver").style.display = "flex";
  finalScoreEl.innerText = score;
}
</script>

</body>
</html>
