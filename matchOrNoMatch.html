<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match Game</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:#f5f6fa;
  overflow-x:hidden;
}

/* HEADER */

.header{
  width:100%;
  height:60px;
  background:#fff;
  border-bottom:1px solid #ddd;

  display:flex;
  align-items:center;
  justify-content:center;

  position:fixed;
  top:0;
  left:0;
  z-index:1000;
}

.header h2{
  font-size:20px;
}

.back-btn{
  position:absolute;
  left:15px;

  background:none;
  border:none;

  font-size:18px;
  color:#6c5ce7;
  font-weight:bold;

  cursor:pointer;
}

/* MENU */

#menuScreen{
  width:100%;
  min-height:100vh;

  padding-top:90px;
  padding-bottom:40px;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  gap:20px;
}

.menu-card,
.how-card{
  width:90%;
  max-width:420px;

  background:#fff;
  border-radius:20px;

  box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

.menu-card{
  padding:30px 20px;
  text-align:center;
}

.icon{
  width:80px;
  height:80px;
  border-radius:50%;

  background:linear-gradient(135deg,#6c5ce7,#4834d4);

  display:flex;
  align-items:center;
  justify-content:center;

  margin:auto;

  font-size:36px;
  color:white;
}

.menu-card h1{
  margin-top:15px;
  font-size:34px;
}

.tag{
  display:inline-block;

  margin-top:10px;

  background:#eee9ff;
  color:#6c5ce7;

  padding:6px 14px;
  border-radius:20px;

  font-size:13px;
}

.desc{
  margin-top:15px;
  color:#666;
  font-size:15px;
}

.how-card{
  padding:25px;
}

.how-card h2{
  margin-bottom:15px;
}

.step{
  display:flex;
  align-items:center;
  gap:12px;

  margin:12px 0;
}

.num{
  width:34px;
  height:34px;
  border-radius:10px;

  background:#f1ede7;

  display:flex;
  align-items:center;
  justify-content:center;

  font-weight:bold;
}

.start-btn{
  width:90%;
  max-width:420px;
  height:60px;

  border:none;
  border-radius:16px;

  background:linear-gradient(135deg,#6c5ce7,#4834d4);

  color:white;
  font-size:22px;
  font-weight:bold;

  cursor:pointer;
}

/* GAME SCREEN */

#gameScreen{
  display:none;

  width:100%;
  min-height:100vh;

  padding-top:70px;
  padding-bottom:20px;

  flex-direction:column;
  align-items:center;

  text-align:center;

  overflow-y:auto;
}

/* TOP BAR */

.top-bar{
  width:95%;
  max-width:560px;

  display:flex;
  justify-content:space-between;

  margin:0 auto 18px auto;

  font-weight:bold;
  font-size:14px;
}

/* RULE */

.rule{
  font-size:22px;
  font-weight:bold;

  line-height:1.3;

  margin-bottom:24px;

  padding:0 16px;

  max-width:560px;
}

/* PANELS */

.panels{
  width:100%;
  max-width:560px;

  display:flex;
  align-items:center;
  justify-content:center;

  gap:60px;

  margin:20px auto 40px auto;
}

.panel{
  width:170px;
  height:170px;

  display:flex;
  align-items:center;
  justify-content:center;

  position:relative;
}

.panel > *{
  position:absolute;

  top:50%;
  left:50%;

  transform:translate(-50%, -50%);
}

/* LARGE SHAPES */

.circle{
  width:90px;
  height:90px;
  border-radius:50%;
}

.square{
  width:90px;
  height:90px;
  border-radius:10px;
}

.triangle{
  width:0;
  height:0;

  border-left:45px solid transparent;
  border-right:45px solid transparent;
  border-bottom:90px solid;
}

/* PATTERNS */

.pattern-row,
.pattern-grid{
  position:absolute;

  top:50%;
  left:50%;

  transform:translate(-50%, -50%);
}

.pattern-row{
  display:flex;
  align-items:center;
  justify-content:center;

  gap:28px;
}

.pattern-grid{
  width:120px;
  height:120px;

  display:grid;
  grid-template-columns:repeat(2,1fr);

  place-items:center;

  gap:12px;
}

/* MINI SHAPES */

.mini-circle{
  width:34px;
  height:34px;
  border-radius:50%;
}

.mini-square{
  width:34px;
  height:34px;
  border-radius:6px;
}

.mini-triangle{
  width:0;
  height:0;

  border-left:18px solid transparent;
  border-right:18px solid transparent;
  border-bottom:34px solid;
}

/* BUTTONS */

.buttons{
  width:100%;
  max-width:420px;

  display:flex;
  align-items:center;
  justify-content:center;

  gap:16px;

  margin:0 auto;
}

.buttons button{
  width:170px;
  height:56px;

  border:none;
  border-radius:14px;

  color:white;
  font-size:18px;
  font-weight:bold;

  cursor:pointer;
}

.match{
  background:#e57373;
}

.nomatch{
  background:#4fc3f7;
}

/* MESSAGE */

#message{
  margin-top:18px;

  font-size:24px;
  font-weight:bold;

  min-height:30px;
}

/* GAME OVER */

#gameOver{
  display:none;

  width:100%;
  min-height:100vh;

  padding-top:60px;

  text-align:center;

  align-items:center;
  justify-content:center;
  flex-direction:column;
}

#gameOver h1{
  font-size:40px;
}

#gameOver h2{
  margin-top:15px;
  color:#6c5ce7;
}

.restart{
  margin-top:25px;

  width:220px;
  height:55px;

  border:none;
  border-radius:14px;

  background:linear-gradient(135deg,#6c5ce7,#4834d4);

  color:white;
  font-size:20px;
  font-weight:bold;

  cursor:pointer;
}

/* MOBILE */

@media(max-width:500px){

  .top-bar{
    font-size:12px;
  }

  .rule{
    font-size:18px;
  }

  .panels{
    gap:36px;
  }

  .panel{
    width:130px;
    height:130px;
  }

  .circle,
  .square{
    width:75px;
    height:75px;
  }

  .triangle{
    border-left:38px solid transparent;
    border-right:38px solid transparent;
    border-bottom:76px solid;
  }

  .buttons{
    width:90%;
    max-width:380px;
    gap:14px;
  }

  .buttons button{
    flex:1;
    width:auto;
    height:52px;
    font-size:15px;
  }
}

/* LANDSCAPE FIX */

@media (orientation: landscape) and (max-height: 500px){

  body{
    overflow-y:auto;
  }

  #gameScreen{
    justify-content:flex-start;

    min-height:auto;

    padding-top:70px;
    padding-bottom:20px;

    overflow-y:auto;
  }

  .top-bar{
    width:92%;
    font-size:12px;

    margin-top:0;
    margin-bottom:8px;
  }

  .rule{
    font-size:18px;
    line-height:1.2;

    margin-bottom:10px;
    padding:0 12px;
  }

  .panels{
    gap:40px;

    margin-top:10px;
    margin-bottom:18px;
  }

  .panel{
    width:100px;
    height:100px;
  }

  .circle,
  .square{
    width:62px;
    height:62px;
  }

  .triangle{
    border-left:31px solid transparent;
    border-right:31px solid transparent;
    border-bottom:62px solid;
  }

  .pattern-row{
    gap:18px;
  }

  .pattern-grid{
    width:85px;
    height:85px;
    gap:6px;
  }

  .mini-circle,
  .mini-square{
    width:24px;
    height:24px;
  }

  .mini-triangle{
    border-left:12px solid transparent;
    border-right:12px solid transparent;
    border-bottom:24px solid;
  }

  .buttons{
    width:92%;
    max-width:340px;

    gap:10px;
  }

  .buttons button{
    height:42px;

    font-size:13px;

    border-radius:10px;
  }

  #message{
    margin-top:8px;
    font-size:16px;
    min-height:18px;
  }
}

</style>
</head>

<body>

<div class="header">
  <button class="back-btn">← Back</button>
  <h2>Match Game</h2>
</div>

<div id="gameScreen" style="display:flex;">

  <div class="top-bar">
    <div>Score<br><span>0</span></div>
    <div>High<br><span>52</span></div>
    <div>Level<br><span>1</span></div>
    <div>Round<br><span>1</span>/30</div>
  </div>

  <div class="rule">
    Level 1: Are the shapes the same or different?
  </div>

  <div class="panels">

    <div class="panel">
      <div class="triangle" style="border-bottom-color:#00b894;"></div>
    </div>

    <div class="panel">
      <div class="square" style="background:#e17055;"></div>
    </div>

  </div>

  <div class="buttons">
    <button class="match">MATCH</button>
    <button class="nomatch">NO MATCH</button>
  </div>

  <div id="message"></div>

</div>

</body>
</html>
