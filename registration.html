<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registration</title>

<style>

body{
  font-family: Arial, sans-serif;
  background:#f8f6f3;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  margin:0;
}

.card{
  background:white;
  padding:30px;
  width:90%;
  max-width:450px;
  border-radius:18px;
  box-shadow:0 4px 20px rgba(0,0,0,0.1);
}

h1{
  margin-top:0;
}

label{
  display:block;
  margin-top:16px;
  font-weight:600;
}

input{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:1px solid #ccc;
  border-radius:10px;
  box-sizing:border-box;
}

button{
  margin-top:22px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#e17055;
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="card">

<h1>Institution Registration</h1>

<label>Institution Name</label>
<input type="text" id="institution">

<label>Admin Name</label>
<input type="text" id="admin">

<label>Secret Admin Code</label>
<input type="password" id="secret">

<button onclick="registerInstitution()">
Complete Registration
</button>

</div>

<script>

const ADMIN_SECRET = "CTG2026";

function registerInstitution(){

  const institution =
    document.getElementById("institution").value.trim();

  const admin =
    document.getElementById("admin").value.trim();

  const secret =
    document.getElementById("secret").value.trim();

  if(!institution || !admin || !secret){
    alert("Please fill all fields");
    return;
  }

  if(secret !== ADMIN_SECRET){
    alert("Invalid secret code");
    return;
  }

  localStorage.setItem("ctg_registered","true");

  localStorage.setItem(
    "ctg_institution",
    institution
  );

  localStorage.setItem(
    "ctg_admin",
    admin
  );

  window.location.href = "index.html";
}

</script>

</body>
</html>
