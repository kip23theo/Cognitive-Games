<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sorter Game</title>

<style>
:root {
  --surface: #ffffff;
  --surface2: #f0ede8;
  --text: #2d3436;
  --border: #e0dbd5;
}

[data-theme="dark"] {
  --bg: #141414;
  --surface: #1f1f1f;
  --text: #f0ede8;
  --text-light: #9a9590;
  --border: #333333;
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
}

body {
  font-family: Arial, sans-serif;
  background: #f8f6f3;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}

.header {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  padding: 12px;
  background: #fff;
  border-bottom: 1px solid #e0dbd5;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  width: 100%;
  min-height: 45px;
}

#menuBackBtn,
#backBtn {
  position: absolute;
  left: 16px;
  background: none;
  border: none;
  font-size: 16px;
  cursor: pointer;
  color: #6c5ce7;
  font-weight: bold;
  padding: 4px 8px;
  border-radius: 6px;
}

#backBtn {
  display: none;
}

#menuBackBtn:hover,
#backBtn:hover {
  background: #eee9ff;
}

.menu-screen {
  position: fixed;
  top: 45px;
  left: 0;
  right: 0;
  bottom: 0;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  gap: 16px;
  padding: 20px;
}

.menu-hero {
  width: 90%;
  max-width: 420px;
  background: white;
  border-radius: 20px;
  padding: 24px;
  text-align: center;
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

.game-icon-big {
  width: 70px;
  height: 70px;
  margin: auto;
  border-radius: 50%;
  background: linear-gradient(135deg, #6c5ce7, #4d3dbb);
  color: white;
  font-size: 32px;

  display: flex;
  align-items: center;
  justify-content: center;
}

.domain-tag {
  background: #eee9ff;
  color: #6c5ce7;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  display: inline-block;
  margin: 10px 0;
}

.menu-desc {
  color: #636e72;
  font-size: 14px;
}

.how-to {
  width: 90%;
  max-width: 420px;
  background: white;
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.06);
}

.how-to-row {
  display: flex;
  gap: 10px;
  margin: 10px 0;
}

.key-badge {
  background: #f3f0ea;
  border-radius: 8px;
  padding: 6px 12px;
  font-weight: bold;
}

.start-btn {
  width: 90%;
  max-width: 420px;
  background: linear-gradient(135deg, #6c5ce7, #4d3dbb);
  color: white;
  border: none;
  border-radius: 14px;
  padding: 16px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
}

#game {
  display: none;

  width: 100vw;
  height: calc(100vh - 45px);

  flex-direction: column;
  justify-content: center;
  align-items: center;

  text-align: center;
  padding: 10px;
}

.top {
  width: calc(100vw - 24px);
  max-width: 540px;

  display: flex;
  justify-content: space-between;
  align-items: center;

  margin-bottom: 10px;

  padding: 10px 12px;
  background: white;
  border-radius: 12px;

  box-shadow: 0 4px 14px rgba(0,0,0,0.08);

  font-size: 14px;
  font-weight: bold;
}

#rule {
  font-size: 20px;
  font-weight: bold;
  margin: 10px 0 16px;
}

canvas {
  width: 75vw;
  height: 75vw;

  max-width: 420px;
  max-height: 420px;

  display: block;
}

.btns {
  display: flex;
  gap: 12px;

  width: calc(100vw - 24px);
  max-width: 360px;

  margin-top: 18px;
}

.btns button {
  flex: 1;
  height: 50px;
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
}

.left {
  background: #d96f6f;
}

.right {
  background: #56aeea;
}

.restart {
  background: #8f8f8f;
}

#result {
  margin-top: 14px;
  font-size: 22px;
  font-weight: bold;
  min-height: 30px;
}

#finalScore {
  margin-top: 8px;
  font-size: 20px;
  font-weight: bold;
}

@media screen and (orientation: landscape) {
  body {
    overflow: hidden;
  }

  #game {
    height: calc(100vh - 40px);
    justify-content: center;
    padding: 6px;
  }

  .top {
    max-width: 620px;
    font-size: 13px;
    margin-bottom: 6px;
  }

  #rule {
    font-size: 16px;
    margin: 6px 0;
  }

  canvas {
    width: 55vh;
    height: 55vh;

    max-width: 340px;
    max-height: 340px;
  }

  .btns {
    max-width: 340px;
    margin-top: 8px;
  }

  .btns button {
    height: 40px;
    font-size: 13px;
  }

  #result {
    font-size: 18px;
  }
}

[data-theme="dark"] body {
  background: #141414;
  color: #f0ede8;
}

[data-theme="dark"] .header,
[data-theme="dark"] .menu-hero,
[data-theme="dark"] .how-to,
[data-theme="dark"] .top {
  background: #1f1f1f;
  color: #f0ede8;
}

[data-theme="dark"] .menu-desc {
  color: #9a9590;
}

[data-theme="dark"] .domain-tag {
  background: rgba(108,92,231,0.2);
  color: #a89cf7;
}

[data-theme="dark"] .key-badge {
  background: #2a2a2a;
  color: #f0ede8;
}
</style>
</head>

<body>

<div class="header">
  <button id="menuBackBtn" onclick="goHome()">← Back</button>
  <button id="backBtn" onclick="goBack()">← Back</button>
</div>

<div id="menuScreen" class="menu-screen">

  <div class="menu-hero">
    <div class="game-icon-big">📦</div>

    <h2>Sorter Game</h2>

    <div class="domain-tag">
      Memory · Sorting
    </div>

    <p class="menu-desc">
      Observe the rule and make the right move.
    </p>
  </div>

  <div class="how-to">
    <h2>How to Play</h2>

    <div class="how-to-row">
      <span class="key-badge">1</span>
      <span>Carefully read the rule shown above the shape</span>
    </div>

    <div class="how-to-row">
      <span class="key-badge">2</span>
      <span>Observe the shape or color displayed in the center</span>
    </div>

    <div class="how-to-row">
      <span class="key-badge">3</span>
      <span>Decide if it matches and choose correct button</span>
    </div>
  </div>

  <button id="startBtn" class="start-btn">
    ▶ Start Game
  </button>

</div>

<div id="game">

  <div class="top">
    <div>Level: <span id="level">1</span></div>
    <div>Highest: <span id="highScore">0</span></div>
    <div>Score: <span id="score">0</span></div>
  </div>

  <div id="rule"></div>

  <canvas id="canvas"></canvas>

  <div class="btns">
    <button class="left" onclick="check('L')">
      LEFT
    </button>

    <button class="right" onclick="check('R')">
      RIGHT
    </button>

    <button class="restart" onclick="restart()">
      RESTART
    </button>
  </div>

  <div id="result"></div>
  <div id="finalScore"></div>

</div>

<script src="shared.js"></script>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const ruleEl = document.getElementById("rule");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");

const highScoreEl = document.getElementById("highScore");

const menuBackBtn = document.getElementById("menuBackBtn");
const backBtn = document.getElementById("backBtn");

const shapes = ["circle", "square", "triangle", "star"];

const colors = {
  red: "#d96f6f",
  blue: "#56aeea",
  green: "#59b77f",
  yellow: "#e5c25d"
};

let score = 0;
let level = 1;
let highScore =
  Number(localStorage.getItem("sorter-high")) || 0;

let gameOver = false;

let ruleType;
let ruleValue;
let ruleSide;

let current;

highScoreEl.innerText = highScore;

const Sound = {
  ctx: null,

  isEnabled() {
    return localStorage.getItem("ctg-sound") !== "off";
  },

  init() {
    const AudioContext =
      window.AudioContext ||
      window.webkitAudioContext;

    if (!AudioContext) return;

    if (!this.ctx) {
      this.ctx = new AudioContext();
    }

    if (this.ctx.state === "suspended") {
      this.ctx.resume();
    }
  },

  tone(freq, dur) {
    if (!this.isEnabled()) return;

    this.init();

    if (!this.ctx) return;

    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();

    osc.frequency.value = freq;
    gain.gain.value = 0.15;

    osc.connect(gain);
    gain.connect(this.ctx.destination);

    osc.start();
    osc.stop(this.ctx.currentTime + dur);
  },

  correct() {
    this.tone(700, 0.12);

    setTimeout(() => {
      this.tone(900, 0.12);
    }, 120);
  },

  wrong() {
    this.tone(220, 0.22);
  }
};

function goHome() {
  window.location.href = "index.html";
}

function goBack() {
  document.getElementById("game").style.display = "none";

  document.getElementById("menuScreen").style.display = "flex";

  menuBackBtn.style.display = "block";
  backBtn.style.display = "none";
}

document.getElementById("startBtn").onclick = () => {
  document.getElementById("menuScreen").style.display = "none";

  document.getElementById("game").style.display = "flex";

  menuBackBtn.style.display = "none";
  backBtn.style.display = "block";

  Sound.init();

  restart();
};

function resizeCanvas() {
  let size;

  if (window.innerWidth > window.innerHeight) {
    size = Math.min(window.innerHeight * 0.55, 340);
  } else {
    size = Math.min(window.innerWidth * 0.75, 420);
  }

  canvas.width = size;
  canvas.height = size;
}

function draw(shape, color) {
  const w = canvas.width;
  const h = canvas.height;

  ctx.clearRect(0, 0, w, h);

  ctx.fillStyle = color;

  if (shape === "circle") {
    ctx.beginPath();

    ctx.arc(
      w / 2,
      h / 2,
      w / 3.2,
      0,
      Math.PI * 2
    );

    ctx.fill();
  }

  if (shape === "square") {
    ctx.fillRect(
      w * 0.18,
      h * 0.18,
      w * 0.64,
      h * 0.64
    );
  }

  if (shape === "triangle") {
    ctx.beginPath();

    ctx.moveTo(w / 2, h * 0.12);
    ctx.lineTo(w * 0.12, h * 0.85);
    ctx.lineTo(w * 0.88, h * 0.85);

    ctx.closePath();
    ctx.fill();
  }

  if (shape === "star") {
    ctx.font = (w * 0.75) + "px Arial";

    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    ctx.fillText("★", w / 2, h / 2);
  }
}

function newRound() {
  if (gameOver) return;

  resultEl.innerText = "";
  finalScoreEl.innerText = "";

  ruleType =
    level <= 2
      ? "color"
      : Math.random() < 0.5
      ? "color"
      : "shape";

  ruleSide =
    Math.random() < 0.5
      ? "LEFT"
      : "RIGHT";

  const shape =
    shapes[Math.floor(Math.random() * shapes.length)];

  const colorKeys = Object.keys(colors);

  const color =
    colorKeys[Math.floor(Math.random() * colorKeys.length)];

  current = {
    shape,
    color
  };

  ruleValue =
    ruleType === "color"
      ? color
      : shape;

  resizeCanvas();

  draw(shape, colors[color]);

  ruleEl.innerText =
    ruleType === "color"
      ? `If color is ${ruleValue} → ${ruleSide}`
      : `If shape is ${ruleValue} → ${ruleSide}`;

  document.getElementById("score").innerText = score;
  document.getElementById("level").innerText = level;
}

function updateHighScore() {
  if (score > highScore) {
    highScore = score;

    localStorage.setItem(
      "sorter-high",
      highScore
    );

    highScoreEl.innerText = highScore;
  }
}

function check(choice) {
  if (gameOver) return;

  const match =
    ruleType === "color"
      ? current.color === ruleValue
      : current.shape === ruleValue;

  const correct =
    ruleSide === "LEFT"
      ? (match && choice === "L") ||
        (!match && choice === "R")
      : (match && choice === "R") ||
        (!match && choice === "L");

  if (correct) {
    score++;

    updateHighScore();

    Sound.correct();

    resultEl.style.color = "green";
    resultEl.innerText = "Correct ✅";

    if (score === 5) level = 2;
    if (score === 10) level = 3;
    if (score === 15) level = 4;

    setTimeout(() => {
      newRound();
    }, 500);

  } else {
    gameOver = true;

    Sound.wrong();

    resultEl.style.color = "red";
    resultEl.innerText = "Game Over ❌";

    finalScoreEl.innerText =
      "Final Score: " + score;

    updateHighScore();
  }
}

function restart() {
  score = 0;
  level = 1;

  gameOver = false;

  resultEl.innerText = "";
  finalScoreEl.innerText = "";

  document.getElementById("score").innerText = score;
  document.getElementById("level").innerText = level;

  newRound();
}

window.addEventListener("resize", () => {
  resizeCanvas();

  if (current) {
    draw(current.shape, colors[current.color]);
  }
});

resizeCanvas();
</script>

</body>
</html>
