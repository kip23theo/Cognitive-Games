<!DOCTYPE html>
<html>
<head>
<title>Sorter Game</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --surface: #ffffff;
  --surface2: #f0ede8;
  --text: #2d3436;
  --border: #e0dbd5;
}

[data-theme="dark"] {
  --bg: #141414;
  --surface: #1f1f1f;
  --text: #f0ede8;
  --text-light: #9a9590;
  --border: #333333;
  --accent: #ff7a5a;
  --accent-soft: rgba(255,122,90,0.15);
}

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
}

body {
  font-family: Arial, sans-serif;
  background: #f8f6f3;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}

.header {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  padding: 12px;
  background: #fff;
  border-bottom: 1px solid #e0dbd5;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  width: 100%;
  box-sizing: border-box;
  min-height: 45px;
}

#backBtn,
#menuBackBtn {
  position: absolute;
  left: 16px;
  background: none;
  border: none;
  font-size: 16px;
  cursor: pointer;
  color: #6c5ce7;
  font-weight: bold;
  padding: 4px 8px;
  border-radius: 6px;
}

#backBtn { display: none; }
#menuBackBtn { display: block; }

#backBtn:hover,
#menuBackBtn:hover {
  background: #eee9ff;
}

.menu-screen {
  position: fixed;
  top: 45px;
  left: 0;
  right: 0;
  bottom: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 16px;
  padding: 20px;
  overflow-y: auto;
  box-sizing: border-box;
}

.menu-hero {
  width: 90%;
  max-width: 420px;
  background: white;
  border-radius: 20px;
  padding: 24px;
  text-align: center;
  box-shadow: 0 6px 25px rgba(0,0,0,0.08);
}

.game-icon-big {
  width: 70px;
  height: 70px;
  margin: auto;
  border-radius: 50%;
  background: linear-gradient(135deg, #6c5ce7, #4d3dbb);
  color: white;
  font-size: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.domain-tag {
  background: #eee9ff;
  color: #6c5ce7;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  display: inline-block;
  margin: 10px 0;
}

.menu-desc {
  color: #636e72;
  font-size: 14px;
}

.how-to {
  width: 90%;
  max-width: 420px;
  background: white;
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.06);
}

.how-to-row {
  display: flex;
  gap: 10px;
  margin: 8px 0;
}

.key-badge {
  background: #f3f0ea;
  border-radius: 8px;
  padding: 6px 12px;
  font-weight: bold;
}

.start-btn {
  width: 90%;
  max-width: 420px;
  background: linear-gradient(135deg, #6c5ce7, #4d3dbb);
  color: white;
  border: none;
  border-radius: 14px;
  padding: 16px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
}

.shape {
  position: fixed;
  opacity: 0.02;
  z-index: -1;
}

.c1 { width:70px; height:70px; border-radius:50%; background:#e8bcbc; top:40px; left:30px; }
.s1 { width:65px; height:65px; background:#bcd6e8; top:180px; left:25px; }
.t1 { width:0; height:0; border-left:30px solid transparent; border-right:30px solid transparent; border-bottom:55px solid #bfe3cd; bottom:120px; left:40px; }
.star1 { font-size:45px; color:#e6d8a8; bottom:40px; left:60px; }
.c2 { width:70px; height:70px; border-radius:50%; background:#d9bce8; top:60px; right:30px; }
.s2 { width:65px; height:65px; background:#cddff5; top:220px; right:25px; }
.t2 { width:0; height:0; border-left:28px solid transparent; border-right:28px solid transparent; border-bottom:50px solid #cde3bf; bottom:140px; right:35px; }
.star2 { font-size:50px; color:#e8ddb0; bottom:60px; right:70px; }
.midL { width:60px; height:60px; background:#e2c9f2; left:120px; top:250px; }
.midR { width:0; height:0; border-left:25px solid transparent; border-right:25px solid transparent; border-bottom:45px solid #c9f2dc; right:120px; top:300px; }

#bgShapes {
  display: none;
}

#game {
  display: none;
  width: 100vw;
  height: calc(100vh - 45px);
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 8px;
  box-sizing: border-box;
  overflow: hidden;
}

.top {
  width: 100%;
  max-width: 540px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 6px;
  margin-bottom: 8px;
  font-weight: bold;
  font-size: 15px;
}

#highScoreBox {
  text-align: center;
}

#rule {
  font-size: 21px;
  font-weight: 900;
  color: #222;
  margin: 10px 0;
  text-align: center;
}

canvas {
  width: 75vw;
  height: 75vw;
  max-width: 420px;
  max-height: 420px;
  display: block;
  margin: 0 auto;
  outline: none;
  border: none;
}

canvas:focus {
  outline: none;
}

.btns {
  display: flex;
  gap: 10px;
  width: 100%;
  max-width: 360px;
  margin-top: 12px;
}

.btns button {
  flex: 1;
  height: 52px;
  border-radius: 12px;
  font-size: 16px;
  border: none;
  color: white;
  font-weight: bold;
}

.left { background: #c96f6f; }
.right { background: #6f9cc9; }
.restart { background: #888888; }

#result {
  font-size: 22px;
  font-weight: bold;
  margin-top: 8px;
  min-height: 28px;
  transition: transform 0.2s;
}

.pop {
  transform: scale(1.2);
}

#finalScore {
  font-size: 20px;
  font-weight: bold;
}

@media screen and (orientation: landscape) {
  body {
    overflow: hidden;
  }

  .header {
    min-height: 40px;
    padding: 8px;
  }

  #game {
    height: calc(100vh - 40px);
    justify-content: center;
    align-items: center;
    padding: 5px;
  }

  .top {
    max-width: 580px;
    font-size: 14px;
    margin-bottom: 4px;
  }

  #rule {
    font-size: 17px;
    margin: 4px 0;
  }

  canvas {
    width: 55vh;
    height: 55vh;
    max-width: 360px;
    max-height: 360px;
  }

  .btns {
    max-width: 380px;
    margin-top: 6px;
  }

  .btns button {
    height: 42px;
    font-size: 14px;
  }

  #result {
    font-size: 18px;
    margin-top: 4px;
  }
}

[data-theme="dark"] body {
  background: #141414;
  color: #f0ede8;
}

[data-theme="dark"] .shape {
  display: none;
}

[data-theme="dark"] .header {
  background: #1f1f1f;
  border-bottom-color: #333;
}

[data-theme="dark"] #backBtn,
[data-theme="dark"] #menuBackBtn {
  color: #a89cf7;
}

[data-theme="dark"] .menu-hero,
[data-theme="dark"] .how-to {
  background: #1f1f1f;
  color: #f0ede8;
}

[data-theme="dark"] .menu-desc {
  color: #9a9590;
}

[data-theme="dark"] .domain-tag {
  background: rgba(108,92,231,0.2);
  color: #a89cf7;
}

[data-theme="dark"] .key-badge {
  background: #2a2a2a;
  color: #f0ede8;
}

[data-theme="dark"] .top,
[data-theme="dark"] #rule,
[data-theme="dark"] #result,
[data-theme="dark"] #finalScore {
  color: #f0ede8;
}
</style>
</head>

<body>

<div class="header">
  <button id="menuBackBtn" onclick="window.history.back()">← Back</button>
  <button id="backBtn" onclick="goBack()">← Back</button>
</div>

<div id="menuScreen" class="menu-screen">
  <div class="menu-hero">
    <div class="game-icon-big">📦</div>
    <h2>Sorter Game</h2>
    <div class="domain-tag">Memory · Sorting</div>
    <p class="menu-desc">Observe the rule and make the right move.</p>
  </div>

  <div class="how-to">
    <h3>How to Play</h3>

    <div class="how-to-row">
      <span class="key-badge">1</span>
      <span>Observe the rule carefully</span>
    </div>

    <div class="how-to-row">
      <span class="key-badge">2</span>
      <span>Identify the shape or color</span>
    </div>

    <div class="how-to-row">
      <span class="key-badge">3</span>
      <span>Select the correct side</span>
    </div>
  </div>

  <button id="startBtn" class="start-btn">▶ Start Game</button>
</div>

<div id="bgShapes">
  <div class="shape c1"></div>
  <div class="shape s1"></div>
  <div class="shape t1"></div>
  <div class="shape star1">★</div>
  <div class="shape c2"></div>
  <div class="shape s2"></div>
  <div class="shape t2"></div>
  <div class="shape star2">★</div>
  <div class="shape midL"></div>
  <div class="shape midR"></div>
</div>

<div id="game">
  <div class="top">
    <div>Level: <span id="level">1</span></div>
    <div id="highScoreBox">Highest Score: <span id="highScore">0</span></div>
    <div>Score: <span id="score">0</span></div>
  </div>

  <div id="rule"></div>

  <canvas id="canvas" width="300" height="300" tabindex="0"></canvas>

  <div class="btns">
    <button class="left" onclick="check('L')">LEFT</button>
    <button class="right" onclick="check('R')">RIGHT</button>
    <button class="restart" onclick="restart()">RESTART</button>
  </div>

  <div id="result"></div>
  <div id="finalScore"></div>
</div>

<script src="shared.js"></script>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const ruleEl = document.getElementById("rule");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const menuBackBtn = document.getElementById("menuBackBtn");
const backBtn = document.getElementById("backBtn");
const highScoreEl = document.getElementById("highScore");

const Sound = {
  ctx: null,

  isEnabled() {
    return localStorage.getItem("ctg-sound") !== "off";
  },

  init() {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (!AudioContext) return;

    if (!this.ctx) {
      this.ctx = new AudioContext();
    }

    if (this.ctx.state === "suspended") {
      this.ctx.resume();
    }
  },

  tone(frequency, duration) {
    if (!this.isEnabled()) return;

    this.init();
    if (!this.ctx) return;

    const oscillator = this.ctx.createOscillator();
    const gain = this.ctx.createGain();

    oscillator.type = "sine";
    oscillator.frequency.setValueAtTime(frequency, this.ctx.currentTime);
    gain.gain.setValueAtTime(0.3, this.ctx.currentTime);

    oscillator.connect(gain);
    gain.connect(this.ctx.destination);

    oscillator.start();
    oscillator.stop(this.ctx.currentTime + duration);
  },

  correct() {
    if (!this.isEnabled()) return;
    this.tone(700, 0.15);

    setTimeout(() => {
      this.tone(900, 0.12);
    }, 120);
  },

  wrong() {
    if (!this.isEnabled()) return;
    this.tone(220, 0.25);
  }
};

const shapes = ["circle", "square", "triangle", "star"];

const colors = {
  red: "#c96f6f",
  blue: "#6f9cc9",
  green: "#6fb089",
  yellow: "#d4c06a"
};

let score = 0;
let level = 1;
let gameOver = false;

let ruleType;
let ruleValue;
let ruleSide;
let current;

let highScore = 0;
highScoreEl.innerText = highScore;

document.getElementById("startBtn").onclick = () => {
  document.getElementById("menuScreen").style.display = "none";
  document.getElementById("game").style.display = "flex";
  document.getElementById("bgShapes").style.display = "block";

  menuBackBtn.style.display = "none";
  backBtn.style.display = "block";

  Sound.init();
  restart();
  canvas.focus();
};

function goBack() {
  gameOver = true;

  document.getElementById("menuScreen").style.display = "flex";
  document.getElementById("game").style.display = "none";
  document.getElementById("bgShapes").style.display = "none";

  menuBackBtn.style.display = "block";
  backBtn.style.display = "none";
}

function resizeCanvas() {
  let size;

  if (window.innerWidth > window.innerHeight) {
    size = Math.min(window.innerHeight * 0.55, 360);
  } else {
    size = Math.min(window.innerWidth * 0.75, 420);
  }

  canvas.width = size;
  canvas.height = size;
}

function newRound() {
  if (gameOver) return;

  resultEl.textContent = "";
  finalScoreEl.textContent = "";

  ruleType =
    level === 1 ? "color" :
    level === 2 ? "shape" :
    Math.random() < 0.5 ? "color" : "shape";

  ruleSide = Math.random() < 0.5 ? "LEFT" : "RIGHT";

  const shape = shapes[Math.floor(Math.random() * shapes.length)];
  const keys = Object.keys(colors);
  const color = keys[Math.floor(Math.random() * keys.length)];

  current = { shape, color };
  ruleValue = ruleType === "color" ? color : shape;

  resizeCanvas();
  draw(shape, colors[color]);

  ruleEl.innerText = ruleType === "color"
    ? "If color is " + ruleValue + " → " + ruleSide
    : "If shape is " + ruleValue + " → " + ruleSide;

  document.getElementById("level").innerText = level;
  document.getElementById("score").innerText = score;
  highScoreEl.innerText = highScore;

  canvas.focus();
}

function draw(shape, color) {
  const w = canvas.width;
  const h = canvas.height;

  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = color;

  if (shape === "circle") {
    ctx.beginPath();
    ctx.arc(w / 2, h / 2, w / 3.2, 0, Math.PI * 2);
    ctx.fill();
  }

  if (shape === "square") {
    ctx.fillRect(w * 0.18, h * 0.18, w * 0.64, h * 0.64);
  }

  if (shape === "triangle") {
    ctx.beginPath();
    ctx.moveTo(w / 2, h * 0.12);
    ctx.lineTo(w * 0.12, h * 0.85);
    ctx.lineTo(w * 0.88, h * 0.85);
    ctx.closePath();
    ctx.fill();
  }

  if (shape === "star") {
    ctx.font = (w * 0.75) + "px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("★", w / 2, h / 2);
  }
}

function updateHighScore() {
  if (score > highScore) {
    highScore = score;
    highScoreEl.innerText = highScore;
  }
}

function check(choice) {
  if (gameOver) return;

  const match = ruleType === "color"
    ? current.color === ruleValue
    : current.shape === ruleValue;

  const correct = ruleSide === "LEFT"
    ? (match && choice === "L") || (!match && choice === "R")
    : (match && choice === "R") || (!match && choice === "L");

  if (correct) {
    score++;
    updateHighScore();

    resultEl.innerText = "Correct 😊";
    resultEl.classList.add("pop");

    setTimeout(() => {
      resultEl.classList.remove("pop");
    }, 200);

    Sound.correct();

    if (score === 5) level = 2;
    else if (score === 10) level = 3;
    else if (score === 15) level = 4;
    else if (score === 20) level = 5;
    else if (score === 25) level = 6;
    else if (score === 30) level = 7;

    document.getElementById("score").innerText = score;
    document.getElementById("level").innerText = level;

    setTimeout(newRound, 700);
  } else {
    gameOver = true;

    resultEl.innerText = "Game Over";
    finalScoreEl.innerText = "Score: " + score;

    updateHighScore();
    Sound.wrong();
  }
}

function restart() {
  score = 0;
  level = 1;
  gameOver = false;

  resultEl.innerText = "";
  finalScoreEl.innerText = "";

  document.getElementById("score").innerText = score;
  document.getElementById("level").innerText = level;
  highScoreEl.innerText = highScore;

  newRound();
}

canvas.addEventListener("keydown", function(e) {
  if (gameOver) return;

  if (e.key === "ArrowLeft" || e.key === "ArrowRight") {
    e.preventDefault();
    e.stopPropagation();

    if (e.key === "ArrowLeft") {
      check("L");
    } else {
      check("R");
    }
  }
}, { passive: false });

window.addEventListener("resize", () => {
  resizeCanvas();

  if (current) {
    draw(current.shape, colors[current.color]);
  }
});

window.addEventListener("orientationchange", () => {
  setTimeout(() => {
    resizeCanvas();

    if (current) {
      draw(current.shape, colors[current.color]);
    }
  }, 300);
});

resizeCanvas();
</script>

</body>
</html>
